appId: com.gstj.reactnativemagicmodalexample
---
# Smoke test: open the primary modal example and dismiss it via the in-modal
# Close button. NOTE: src/app/index.tsx's showModal() also auto-closes via
# setTimeout(2000), so this flow taps "Close Modal" promptly to avoid racing
# the timer.
#
# Uses testID selectors (id:) because XCUITest on iOS 26+ does not reliably
# expose RN <Text> nodes inside <Pressable> for text-based assertions.
- launchApp
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "show-modal-button"
    timeout: 15000
- tapOn:
    id: "show-modal-button"
- extendedWaitUntil:
    visible:
      id: "close-modal-button"
    timeout: 5000
- tapOn:
    id: "close-modal-button"
- extendedWaitUntil:
    visible:
      id: "show-modal-button"
    timeout: 5000
