appId: com.gstj.reactnativemagicmodalexample
---
# Smoke test: verify the kitchen-sink app launches and the home screen renders.
# Uses testID selectors (id:) instead of text labels because XCUITest on
# iOS 26+ does not always expose RN <Text> nodes inside <Pressable> to the
# accessibility tree, which makes text-based assertions flaky.
- launchApp
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "show-modal-button"
    timeout: 15000
